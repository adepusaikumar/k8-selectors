apiVersion: v1
kind: Pod
metadata:
  name: node-anti-affinity-pod
  labels:
    env: test
spec:
  containers:
    - name: nginx
      image: nginx
  affinity:
    nodeAffinity:
      # Hard Rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: NotIn
                values:
                  - us-east-1d
              - key: project
                operator: NotIn
                values:
                  - amazon
  tolerations:
    - key: "hardware"
      operator: "Equal"
      value: "gpu"
      effect: "NoExecute"
                  

                
  
