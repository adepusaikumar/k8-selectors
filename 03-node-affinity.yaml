apiVersion: v1
kind: Pod
metadata:
  name: node-affinity-pod
  labels:
    env: test
spec:
  containers:
    - name: nginx
      image: nginx
  affinity:
    nodeAffinity:
      # Hard Rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                  - us-east-1d
                  - us-east-1b
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: project
                operator: In
                values:
                  - roboshop
        - weight: 10
          preference:
            matchExpressions:
              - key: project
                operator: In
                values:
                  - amazon
                  

                
  
