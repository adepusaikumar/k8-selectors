apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    tier: database
spec:
  containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-2
  labels:
    tier: backend
spec:
  affinity:
  # In pod dedicated to anti-affinity rules, we can specify that the pod should not be scheduled on a node if there is already a pod with the specified label running on that node.
    podAntiAffinity:
      # Hard Rule
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: tier
            operator: In
            values:
            - database
        topologyKey: topology.kubernetes.io/zone
  containers:
  - name: nginx
    image: nginx